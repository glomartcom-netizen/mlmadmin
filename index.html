<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DimeX Final Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:sans-serif;margin:0;display:flex;background:#f4f7f6}
.sidebar{width:240px;background:#111;color:#fff;padding:20px;height:100vh}
.sidebar div{padding:12px;cursor:pointer;border-radius:5px}
.sidebar div:hover{background:#333}
.main{flex:1;padding:20px}
.section{display:none;background:#fff;padding:20px;border-radius:10px}
.active{display:block}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #eee}
th{background:#222;color:#fff}
</style>
</head>

<body>

<div class="sidebar">
<div onclick="show('members')">👥 Members</div>
<div onclick="show('deposit')">📅 Daily Deposits</div>
<div onclick="show('payout')">💸 Daily Payout</div>
<div onclick="show('fourx')">🔥 4X Users</div>
<div onclick="show('unlock')">🔓 Unlock Users</div>
<div onclick="show('growth')">📈 Growth</div>
<div onclick="show('withdraw')">🏧 Withdraw</div>
<div onclick="show('fund')">💰 Add Fund</div>
<div onclick="show('convert')">🔁 Wallet→Deposit</div>
</div>

<div class="main">

<div id="members" class="section active">
<h3>Members</h3>

<!-- ✅ ADD HERE -->
<input id="search" placeholder="Search Member..." onkeyup="filterMembers()" style="margin-bottom:10px;padding:8px;width:250px">

<table id="memberTable"></table>
</div>

<div id="deposit" class="section">
<h3>Daily Deposits</h3>

<input id="depositSearch" placeholder="Search Deposit..." onkeyup="filterDeposits()">

<table id="depositTable"></table>
</div>

<div id="payout" class="section">
<h3>Daily Payout</h3>
<input type="date" id="payoutDate">
<button onclick="loadPayout()">Load</button>
<table id="payoutTable"></table>
</div>

<div id="fourx" class="section">
<h3>4X Users</h3>
<table id="fourxTable"></table>
</div>

<div id="unlock" class="section">
<h3>Unlock Users</h3>
<table id="unlockTable"></table>
</div>

<div id="growth" class="section">
<h3>Growth</h3>
<canvas id="growthChart"></canvas>
</div>

<!-- ✅ FIXED WITHDRAW SECTION -->
<div id="withdraw" class="section">
<h3>Withdraw Requests</h3>

<table border="1" id="withdrawTable">
<thead>
<tr>
<th>Member</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<div id="fund" class="section">
<input id="mid" placeholder="Member ID">
<input id="amt" placeholder="Amount">
<button onclick="addFund()">Add</button>
</div>

<div id="convert" class="section">
<input id="c_mid" placeholder="Member ID">
<input id="c_amt" placeholder="Amount">
<button onclick="convertWallet()">Convert</button>
</div>

</div>
<script>
const API="http://localhost:3000";
let current="members";

// 🔥 MONEY FORMAT
function money(x){
    return "₹" + Number(x || 0).toLocaleString('en-IN');
}

// ================= NAVIGATION =================
function show(id){
  current = id;

  document.querySelectorAll('.section').forEach(s=>{
    s.classList.remove('active');
  });

  document.getElementById(id).classList.add('active');

  refresh();
}

// ================= AUTO REFRESH =================
function refresh(){

  if(current==="members") loadMembers();
  if(current==="deposit") loadDeposits();
  if(current==="payout") loadPayout();
  if(current==="fourx") load4x();
  if(current==="unlock") loadUnlock();
  if(current==="growth") loadGrowth();

  // ✅ FIXED LINE
  if(current==="withdraw") loadWithdrawals();
}

// 🔄 AUTO REFRESH EVERY 20s
setInterval(refresh,20000);

// ✅ ADD FILTER FUNCTION HERE
function filterMembers(){
  const input = document.getElementById("search").value.toLowerCase();
  const rows = document.querySelectorAll("#memberTable tr");

  rows.forEach((row, index)=>{
    if(index === 0) return;
    const text = row.innerText.toLowerCase();
    row.style.display = text.includes(input) ? "" : "none";
  });
}

async function loadMembers(){

const data = await fetch(API + "/api/admin/members").then(r=>r.json());

let html = `
<tr>
<th>Date</th>
<th>ID</th>
<th>Name</th>
<th>Password</th>
<th>Mobile</th>
<th>Email</th>
<th>Sponsor ID</th>
<th>Sponsor Name</th>
<th>Deposit</th>
<th>Total Income</th>
<th>4X</th>
<th>Unlock</th>
</tr>
`;

data.forEach(u=>{

html += `
<tr style="${u.is_4x ? 'background:#ffcccc' : ''}">

<td>${u.join_date ? new Date(u.join_date).toLocaleDateString() : ''}</td>

<td>${u.member_id}</td>

<td>${u.full_name}</td>

<!-- 🔒 HIDDEN PASSWORD -->
<td>******</td>

<td>${u.mobile || ''}</td>

<td>${u.email || ''}</td>

<td>${u.sponsor_id || ''}</td>

<td>${u.sponsor_name || ''}</td>

<!-- 💰 MONEY FORMAT -->
<td>${money(u.total_deposit)}</td>

<td>${money(u.total_income)}</td>

<td>${u.is_4x ? '✅ DONE' : '⏳ RUNNING'}</td>

<td style="${u.is_unlocked ? 'background:#ccffcc' : ''}">
${u.is_unlocked ? '🔓 YES' : '🔒 NO'}
</td>

</tr>
`;

});

document.getElementById("memberTable").innerHTML = html;
}

function filterDeposits(){
  const val = document.getElementById("depositSearch").value.toLowerCase();
  const rows = document.querySelectorAll("#depositTable tr");

  rows.forEach((r,i)=>{
    if(i===0) return;
    r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none";
  });
}
      
async function loadDeposits(){

const data = await fetch(API + "/api/admin/daily-deposits").then(r=>r.json());

let html = `
<tr>
<th>Date</th>
<th>ID</th>
<th>Name</th>
<th>Mobile</th>
<th>Email</th>
<th>Sponsor</th>
<th>Amount</th>
<th>Type</th>
</tr>
`;

data.forEach(d=>{

html += `
<tr>

<td>${d.created_at ? new Date(d.created_at).toLocaleString() : ''}</td>

<td>${d.member_id}</td>

<td>${d.full_name}</td>

<td>${d.mobile || ''}</td>

<td>${d.email || ''}</td>

<td>${d.sponsor_id || ''}</td>

<!-- 💰 MONEY FORMAT -->
<td style="color:green;font-weight:bold">${money(d.amount)}</td>

<td>${d.deposit_type || ''}</td>

</tr>
`;

});

document.getElementById("depositTable").innerHTML = html;
}

async function loadPayout(){

const date = document.getElementById("payoutDate").value;

const url = date 
  ? API + "/api/admin/daily-payout?date=" + date 
  : API + "/api/admin/daily-payout";

const data = await fetch(url).then(r=>r.json());

let html = `
<tr>
<th>ID</th>
<th>Name</th>
<th>Mobile</th>
<th>Total</th>
<th>Today</th>
<th>ROI</th>
<th>Direct</th>
<th>Level</th>
<th>Remaining</th>
<th>4X</th>
<th>Unlock</th>
</tr>
`;

data.forEach(u=>{

// ✅ SAFE VALUES
const total = u.total_income || 0;
const today = u.today_income || 0;
const roi = u.roi || 0;
const direct = u.direct || 0;
const level = u.level || 0;
const remaining = u.remaining > 0 ? u.remaining : 0;

html += `
<tr style="${u.is_4x ? 'background:#ffcccc' : ''}">

<td>${u.member_id}</td>

<td>${u.full_name}</td>

<td>${u.mobile || ''}</td>

<!-- 💰 TOTAL -->
<td><b>${money(total)}</b></td>

<!-- 🟢 TODAY -->
<td style="color:green"><b>${money(today)}</b></td>

<!-- 🎯 ROI -->
<td style="color:green">${money(roi)}</td>

<!-- 🔥 DIRECT -->
<td style="color:orange">${money(direct)}</td>

<!-- 🔵 LEVEL -->
<td style="color:blue">${money(level)}</td>

<!-- ⚠️ REMAINING -->
<td style="color:red">${money(remaining)}</td>

<!-- 4X -->
<td>${u.is_4x ? '✅ DONE' : '⏳ RUNNING'}</td>

<!-- 🔓 UNLOCK -->
<td style="${u.is_unlocked ? 'background:#ccffcc' : ''}">
${u.is_unlocked ? '🔓 YES' : '🔒 NO'}
</td>

</tr>
`;

});

document.getElementById("payoutTable").innerHTML = html;
}

async function load4x(){

const data = await fetch(API + "/api/admin/4x-status").then(r=>r.json());

let html = `
<tr>
<th>ID</th>
<th>Deposit</th>
<th>Total</th>
<th>Remaining</th>
<th>Status</th>
</tr>
`;

data.forEach(u=>{

const deposit = u.total_deposit || 0;
const total = u.total_income || 0;
const remaining = u.remaining > 0 ? u.remaining : 0;

html += `
<tr style="${u.is_4x ? 'background:#ffcccc' : ''}">

<td>${u.member_id}</td>

<!-- 💰 Deposit -->
<td>${money(deposit)}</td>

<!-- 💰 Total -->
<td><b>${money(total)}</b></td>

<!-- ⚠️ Remaining -->
<td style="color:red">${money(remaining)}</td>

<!-- STATUS -->
<td>
${u.is_4x 
  ? '<span style="color:green;font-weight:bold">✅ DONE</span>' 
  : '<span style="color:orange">⏳ RUNNING</span>'
}
</td>

</tr>
`;
});

document.getElementById("fourxTable").innerHTML = html;
}

async function loadUnlock(){

const data = await fetch(API + "/api/admin/unlocked-users").then(r=>r.json());

let html = `
<tr>
<th>ID</th>
<th>Name</th>
<th>Volume</th>
<th>Status</th>
</tr>
`;

data.forEach(u=>{

const vol = u.direct_volume || 0;

html += `
<tr style="background:#ccffcc">

<td>${u.member_id}</td>

<td>${u.full_name}</td>

<!-- 💰 Volume -->
<td style="color:green;font-weight:bold">${money(vol)}</td>

<!-- 🔓 STATUS -->
<td>🔓 UNLOCKED</td>

</tr>
`;
});

document.getElementById("unlockTable").innerHTML = html;
}
  
// GROWTH
async function loadGrowth(){

const data = await fetch(API + "/api/admin/growth").then(r=>r.json());

// ✅ EMPTY SAFE
if(!data || data.length === 0){
  document.getElementById("growthChart").innerHTML = "No Data";
  return;
}

let labels = [], users = [], deposit = [];

data.reverse().forEach(d=>{
  labels.push(d.date);
  users.push(d.users || 0);
  deposit.push(d.deposit || 0);
});

// 🔥 destroy old chart
if(window.chart) window.chart.destroy();

window.chart = new Chart(document.getElementById("growthChart"),{

  type: 'line',

  data: {
    labels: labels,
    datasets: [
      {
        label: 'Users',
        data: users,
        tension: 0.3
      },
      {
        label: 'Deposit',
        data: deposit,
        tension: 0.3
      }
    ]
  },

  options: {

    responsive: true,

    plugins: {
      tooltip: {
        callbacks: {
          label: function(ctx){
            if(ctx.dataset.label === 'Deposit'){
              return "₹" + Number(ctx.raw).toLocaleString("en-IN");
            }
            return ctx.raw;
          }
        }
      }
    },

    scales: {
      x: {
        title: {
          display: true,
          text: 'Date'
        }
      },
      y: {
        title: {
          display: true,
          text: 'Value'
        }
      }
    }

  }

});
}

async function loadWithdrawals(){

  const res = await fetch(API + "/api/admin/withdrawals");
  const data = await res.json();

  const tbody = document.querySelector("#withdrawTable tbody");
  tbody.innerHTML = "";

  // ✅ EMPTY CHECK
  if(!data || data.length === 0){
    tbody.innerHTML = `<tr><td colspan="4">No Withdraw Requests</td></tr>`;
    return;
  }

  data.forEach(w=>{

    const statusColor =
      w.status === "PENDING" ? "orange" :
      w.status === "PAID" ? "green" : "gray";

    const row = `
      <tr>

        <td>${w.member_id}</td>

        <!-- 💰 MONEY FORMAT -->
        <td><b>${money(w.amount)}</b></td>

        <!-- STATUS -->
        <td style="color:${statusColor};font-weight:bold">
          ${w.status}
        </td>

        <!-- ACTION -->
        <td>
          ${
            w.status === "PENDING"
            ? `<button 
                 onclick="approve(${w.id}, this)" 
                 style="
                   background:green;
                   color:#fff;
                   border:none;
                   padding:6px 10px;
                   border-radius:5px;
                   cursor:pointer;
               ">
                 Approve
               </button>`
            : `<span style="color:green">✔ Done</span>`
          }
        </td>

      </tr>
    `;

    tbody.innerHTML += row;
  });
}

async function approve(id, btn){

  // 🔒 disable button (prevent double click)
  btn.disabled = true;
  btn.innerText = "Processing...";

  await fetch(API + "/api/admin/withdraw-paid", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ id })
  });

  // 🔄 reload
  loadWithdrawals();
}

async function addFund(){

  const memberId = document.getElementById("mid").value;
  const amount = document.getElementById("amt").value;

  // ❌ VALIDATION
  if(!memberId || !amount){
    alert("Enter Member ID & Amount");
    return;
  }

  if(isNaN(amount) || Number(amount) <= 0){
    alert("Invalid Amount");
    return;
  }

  try{

    const res = await fetch(API + "/api/admin/add-fund", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        member_id: memberId,
        amount: Number(amount)
      })
    });

    const data = await res.json();

    if(data.success){
      alert("✅ Fund Added Successfully");

      // 🔄 clear form
      document.getElementById("mid").value = "";
      document.getElementById("amt").value = "";

    }else{
      alert("❌ Failed to Add Fund");
    }

  }catch(err){
    alert("❌ Server Error");
    console.log(err);
  }
}

async function convertWallet(){

  const memberId = document.getElementById("c_mid").value;
  const amount = document.getElementById("c_amt").value;

  // ❌ VALIDATION
  if(!memberId || !amount){
    alert("Enter Member ID & Amount");
    return;
  }

  if(isNaN(amount) || Number(amount) <= 0){
    alert("Invalid Amount");
    return;
  }

  try{

    const res = await fetch(API + "/api/admin/wallet-to-deposit", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        member_id: memberId,
        amount: Number(amount)
      })
    });

    const data = await res.json();

    if(data.success){
      alert("✅ Converted Successfully");

      // 🔄 clear form
      document.getElementById("c_mid").value = "";
      document.getElementById("c_amt").value = "";

    }else{
      alert("❌ Conversion Failed");
    }

  }catch(err){
    alert("❌ Server Error");
    console.log(err);
  }
}

</script>

</body>
</html>
