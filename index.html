<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DimeX Admin PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:sans-serif;margin:0;display:flex;background:#f4f7f6}
.sidebar{width:260px;background:#111;color:#fff;padding:20px;height:100vh;overflow:auto}
.sidebar div{padding:12px;cursor:pointer;border-radius:5px}
.sidebar div:hover{background:#333}
.main{flex:1;padding:20px;overflow:auto}
.section{display:none;background:#fff;padding:20px;border-radius:10px;margin-bottom:20px}
.active{display:block}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #eee;text-align:center}
button{padding:5px 10px;margin:2px;cursor:pointer}
input{padding:8px;margin:5px}
</style>
</head>

<body>

<div class="sidebar">
<div onclick="show('members')">👥 Members</div>
<div onclick="show('tree')">🌳 Team Tree</div>
<div onclick="show('wallet')">💰 Wallet Logs</div>
<div onclick="show('level')">📊 Level Tracker</div>
<div onclick="show('roi')">⏳ ROI Status</div>
<div onclick="show('withdraw')">🏧 Withdraw</div>
<div onclick="show('deposit')">💳 Deposits</div>
<div onclick="show('report')">📊 Report</div>
<div onclick="show('growth')">📈 Growth</div>
<div onclick="show('unlock')">🔓 Unlock</div>
<div onclick="show('fourx')">🔥 4X</div>
</div>

<div class="main">

<div id="members" class="section active"><h3>Members</h3><table id="memberTable"></table></div>

<div id="tree" class="section">
<h3>Team Tree</h3>
<input id="treeId" placeholder="Member ID">
<button onclick="loadTree()">Load</button>
<div id="treeData"></div>
</div>

<div id="wallet" class="section">
<h3>Wallet Transactions</h3>
<input id="walletId" placeholder="Member ID">
<button onclick="loadWallet()">Load</button>
<table id="walletTable"></table>
</div>

<div id="level" class="section">
<h3>Level Tracker</h3>
<table id="levelTable"></table>
</div>

<div id="roi" class="section">
<h3>ROI Status</h3>
<table id="roiTable"></table>
</div>

<div id="withdraw" class="section"><h3>Withdraw</h3><table id="withdrawTable"></table></div>
<div id="deposit" class="section"><h3>Deposits</h3><table id="depositTable"></table></div>
<div id="report" class="section"><h3>Daily Report</h3><div id="reportContent"></div></div>

<div id="growth" class="section">
<h3>Growth</h3>
<canvas id="growthChart"></canvas>
</div>

<div id="unlock" class="section">
<h3>Unlock System</h3>
<p id="unlockCount"></p>
<table id="unlockTable"></table>
<table id="progressTable"></table>
</div>

<div id="fourx" class="section">
<h3>4X Achievers</h3>
<table id="fourxTable"></table>
</div>

</div>

<script>
const API="http://localhost:3000";
let current="members";

function show(id){
current=id;
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
refresh();
}

// ================= MEMBERS =================
async function loadMembers(){
const data=await fetch(API+"/api/admin/members").then(r=>r.json());

let html=`<tr>
<th>ID</th><th>Name</th><th>Password</th>
<th>Sponsor</th><th>Mobile</th><th>Email</th>
<th>Status</th><th>Deposit</th><th>4X</th>
</tr>`;

data.forEach(u=>{
let color=u.is_4x?"style='background:#ffcccc'":"";
html+=`<tr ${color}>
<td>${u.member_id}</td>
<td>${u.full_name}</td>
<td>${u.password}</td>
<td>${u.sponsor_id}</td>
<td>${u.mobile}</td>
<td>${u.email}</td>
<td>${u.status}</td>
<td>${u.total_deposit}</td>
<td>${u.is_4x?"🟥 DONE":"🟢 RUNNING"}</td>
</tr>`;
});
memberTable.innerHTML=html;
}

// ================= TREE =================
async function loadTree(){
const id=treeId.value;
const data=await fetch(API+"/api/user/full-tree/"+id).then(r=>r.json());
let html="";
data.forEach(u=>{
html+=`<p>Level ${u.level} - ${u.member_id} - ₹${u.total_deposit}</p>`;
});
treeData.innerHTML=html;
}


// ================= LEVEL =================
async function loadLevel(){

const data = await fetch(API+"/api/admin/level-tracker")
.then(r=>r.json());

let html = `<tr>
<th>Member</th>
<th>Level</th>
<th>Daily</th>
<th>Days Left</th>
<th>Status</th>
</tr>`;

data.forEach(l=>{
html+=`<tr>
<td>${l.member_id}</td>
<td>${l.level_no}</td>
<td>${l.daily_amt}</td>
<td>${l.days_left}</td>
<td>${l.status}</td>
</tr>`;
});

levelTable.innerHTML = html;
}

// ================= ROI =================
async function loadROI(){

const data = await fetch(API+"/api/admin/roi-status")
.then(r=>r.json());

let html = `<tr>
<th>Member</th>
<th>ROI Days</th>
<th>Deposit</th>
</tr>`;

data.forEach(r=>{
html+=`<tr>
<td>${r.member_id}</td>
<td>${r.roi_days}</td>
<td>${r.total_deposit}</td>
</tr>`;
});

roiTable.innerHTML = html;
}

// ================= OTHER =================
async function loadWithdraw(){
const data=await fetch(API+"/api/admin/withdrawals").then(r=>r.json());
let html="";
data.forEach(w=>{
html+=`<tr><td>${w.member_id}</td><td>${w.amount}</td></tr>`;
});
withdrawTable.innerHTML=html;
}

async function loadDeposits(){
const data=await fetch(API+"/api/admin/deposits").then(r=>r.json());
let html="";
data.forEach(d=>{
html+=`<tr><td>${d.member_id}</td><td>${d.amount}</td></tr>`;
});
depositTable.innerHTML=html;
}

async function loadReport(){
const data=await fetch(API+"/api/admin/daily-report").then(r=>r.json());
let html="";
data.forEach(r=>{
html+=`<p>${r.date} - ₹${r.total_payout}</p>`;
});
reportContent.innerHTML=html;
}

async function loadGrowth(){
const data=await fetch(API+"/api/admin/growth").then(r=>r.json());
let labels=[],dep=[];
data.forEach(d=>{
labels.push(d.date);
dep.push(d.deposit);
});
new Chart(document.getElementById("growthChart"),{
type:'line',
data:{labels,datasets:[{label:'Deposit',data:dep}]}
});
}

async function loadUnlock(){
const users=await fetch(API+"/api/admin/unlocked-users").then(r=>r.json());
const count=await fetch(API+"/api/admin/unlock-count").then(r=>r.json());

unlockCount.innerText="Unlocked: "+count.total;

let html="";
users.forEach(u=>{
html+=`<tr><td>${u.member_id}</td><td>${u.direct_volume}</td></tr>`;
});
unlockTable.innerHTML=html;
}

async function load4x(){
const data=await fetch(API+"/api/admin/4x-status").then(r=>r.json());
let html="";
data.forEach(u=>{
if(u.is_4x){
html+=`<tr style="background:#ffcccc">
<td>${u.member_id}</td>
<td>${u.total_income}</td>
</tr>`;
}
});
fourxTable.innerHTML=html;
}

async function loadWallet(){

const id = walletId.value;

// 🔹 user id fetch
const u = await fetch(API+"/api/user/"+id).then(r=>r.json());

if(!u.id){
alert("User not found");
return;
}

// 🔹 transactions fetch
const data = await fetch(API+"/api/admin/wallet-transactions/"+id)
.then(r=>r.json());

let html = `<tr>
<th>Type</th><th>Amount</th><th>Note</th><th>Date</th>
</tr>`;

data.forEach(t=>{
html+=`<tr>
<td>${t.type}</td>
<td>${t.amount}</td>
<td>${t.note}</td>
<td>${t.created_at}</td>
</tr>`;
});

walletTable.innerHTML = html;
}

// ================= REFRESH =================
function refresh(){
if(current==="members") loadMembers();
if(current==="tree") loadTree();
if(current==="wallet") loadWallet();
if(current==="level") loadLevel();
if(current==="roi") loadROI();
if(current==="withdraw") loadWithdraw();
if(current==="deposit") loadDeposits();
if(current==="report") loadReport();
if(current==="growth") loadGrowth();
if(current==="unlock") loadUnlock();
if(current==="fourx") load4x();
}
</script>

</body>
</html>
